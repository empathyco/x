name: Release

on:
  push:
    branches:
      - main

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        shell: sh
    steps:
      # Use GitHub App token as a workaround to allow bypassing branch-protection rules
      # https://github.com/orgs/community/discussions/13836#discussioncomment-8535364
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.GH_TOKENS_APP_ID }}
          private-key: ${{ secrets.GH_TOKENS_APP_PRIVATE_KEY }}

      - name: Git checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config --local user.email "x@empathy.co"
          git config --local user.name "empathy/x"

      - name: Install Build & Pack
        uses: ./.github/actions/install

      - name: Linter
        run: pnpm run lint:check

      - name: Prettier
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Tests
        run: pnpm run test:unit

      - name: Prepare the release (version packages)
        run: pnpm run release:prepare

      - name: Commit release changes
        run: |
          git add .
          git commit -m "chore(release): prepare release [skip ci]" || echo "No changes to commit"

      - name: Publish packages to NPM
        run: pnpm run release:publish

      - name: Create Git tags for published packages
        run: |
          # Get changed packages and create tags
          changed_packages=$(lerna changed --json 2>/dev/null || echo "[]")
          if [ "$changed_packages" != "[]" ]; then
            echo "$changed_packages" | jq -r '.[] | "\(.name)@\(.version)"' | while read -r tag; do
              echo "Creating tag: $tag"
              git tag -a "$tag" -m "$tag"
            done
          else
            echo "No packages to tag"
          fi

      - name: Push commits and tags
        run: |
          git push origin ${{ github.ref_name }}
          git push origin --tags
